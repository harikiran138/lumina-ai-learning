onclick="toggleSidebar()">
<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
</svg>
</button>
<h1 class="text-lg font-semibold text-gray-900 dark:text-white">Content Manager</h1>
</div>
<div class="flex items-center space-x-4">
    <button id="theme-toggle"
        class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800">
        <svg id="light-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg id="dark-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>
    <div class="flex items-center space-x-2">
        <span class="font-semibold text-sm text-gray-700 dark:text-gray-300">Prof. Evelyn
            Reed</span>
        <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold text-lg">
            E</div>
    </div>
</div>
</header>

<main class="flex-1 p-4 md:p-6 lg:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Upload Section -->
        <div class="bg-white dark:bg-[#1C1C1C] p-6 rounded-2xl border border-gray-200 dark:border-gray-800 mb-8">
            <h2 class="text-xl font-bold mb-4">Upload New Content</h2>
            <div id="drop-zone" class="flex items-center justify-center w-full">
                <label for="file-upload"
                    class="flex flex-col items-center justify-center w-full h-64 border-2 border-gray-300 dark:border-gray-700 border-dashed rounded-xl cursor-pointer bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <svg class="w-10 h-10 mb-4 text-gray-500 dark:text-gray-400" aria-hidden="true"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2" />
                        </svg>
                        <p class="mb-2 text-sm text-gray-500 dark:text-gray-400"><span class="font-semibold">Click to
                                upload</span> or drag and drop</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">PDF, DOCX, TXT (MAX. 50MB)
                        </p>
                    </div>
                    <input id="file-upload" type="file" class="hidden" multiple />
                </label>
            </div>
            <div id="upload-feedback" class="mt-4 text-center"></div>
        </div>

        <!-- Content Library -->
        <div class="bg-white dark:bg-[#1C1C1C] p-6 rounded-2xl border border-gray-200 dark:border-gray-800">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Content Library</h2>
                <input type="text" id="search-library" placeholder="Search library..."
                    class="w-64 px-4 py-2 bg-gray-100 dark:bg-gray-800 border-none rounded-lg text-sm focus:ring-2 focus:ring-amber-500">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr
                            class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase border-b border-gray-200 dark:border-gray-700">
                            <th class="py-3 pr-4">File Name</th>
                            <th class="py-3 px-4">Course</th>
                            <th class="py-3 px-4">Date Uploaded</th>
                            <th class="py-3 px-4">AI Status</th>
                            <th class="py-3 pl-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="content-library-table" class="divide-y divide-gray-200 dark:divide-gray-800">
                        <!-- Rows will be dynamically inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</div>

<div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden" onclick="toggleSidebar()"></div>
</div>

<script>
    // --- DATA ---
    let contentLibrary = [
        // Machine Learning Course
        { id: 1, name: 'ML_Fundamentals_Syllabus.pdf', course: 'Machine Learning Fundamentals', date: '2025-09-15', status: 'Completed', size: '2.4 MB' },
        { id: 2, name: 'Deep_Learning_Introduction.pdf', course: 'Machine Learning Fundamentals', date: '2025-09-18', status: 'Completed', size: '5.1 MB' },
        { id: 3, name: 'Neural_Networks_Chapter_1.docx', course: 'Machine Learning Fundamentals', date: '2025-09-20', status: 'Completed', size: '1.8 MB' },
        { id: 4, name: 'Backpropagation_Algorithm.pdf', course: 'Machine Learning Fundamentals', date: '2025-09-22', status: 'Processing', size: '3.2 MB' },

        // Data Science Course
        { id: 5, name: 'Data_Preprocessing_Guide.pdf', course: 'Data Science Essentials', date: '2025-09-10', status: 'Completed', size: '4.5 MB' },
        { id: 6, name: 'Statistical_Analysis_Handbook.pdf', course: 'Data Science Essentials', date: '2025-09-12', status: 'Completed', size: '6.7 MB' },
        { id: 7, name: 'Pandas_Tutorial_Complete.docx', course: 'Data Science Essentials', date: '2025-09-14', status: 'Completed', size: '2.1 MB' },
        { id: 8, name: 'Data_Visualization_Best_Practices.pdf', course: 'Data Science Essentials', date: '2025-09-16', status: 'Completed', size: '8.3 MB' },

        // Web Development Course
        { id: 9, name: 'React_Complete_Guide.pdf', course: 'Modern Web Development', date: '2025-09-05', status: 'Completed', size: '12.4 MB' },
        { id: 10, name: 'JavaScript_ES6_Features.pdf', course: 'Modern Web Development', date: '2025-09-08', status: 'Completed', size: '3.9 MB' },
        { id: 11, name: 'CSS_Grid_and_Flexbox.pdf', course: 'Modern Web Development', date: '2025-09-11', status: 'Completed', size: '5.6 MB' },
        { id: 12, name: 'Node.js_Backend_Development.pdf', course: 'Modern Web Development', date: '2025-09-13', status: 'Processing', size: '7.2 MB' },

        // Quantum Computing Course
        { id: 13, name: 'Quantum_Mechanics_Basics.pdf', course: 'Quantum Computing', date: '2025-08-28', status: 'Completed', size: '9.1 MB' },
        { id: 14, name: 'Qubits_and_Superposition.pdf', course: 'Quantum Computing', date: '2025-09-01', status: 'Completed', size: '4.3 MB' },
        { id: 15, name: 'Quantum_Algorithms_Overview.pdf', course: 'Quantum Computing', date: '2025-09-03', status: 'Completed', size: '6.8 MB' },
        { id: 16, name: 'Shors_Algorithm_Explained.docx', course: 'Quantum Computing', date: '2025-09-06', status: 'Error', size: '2.7 MB' },

        // Cybersecurity Course
        { id: 17, name: 'Network_Security_Fundamentals.pdf', course: 'Cybersecurity Essentials', date: '2025-08-25', status: 'Completed', size: '5.9 MB' },
        { id: 18, name: 'Encryption_Techniques.pdf', course: 'Cybersecurity Essentials', date: '2025-08-27', status: 'Completed', size: '4.1 MB' },
        { id: 19, name: 'Penetration_Testing_Guide.pdf', course: 'Cybersecurity Essentials', date: '2025-08-30', status: 'Completed', size: '11.2 MB' },
        { id: 20, name: 'Ethical_Hacking_Labs.pdf', course: 'Cybersecurity Essentials', date: '2025-09-02', status: 'Processing', size: '15.3 MB' },

        // Cloud Computing  Course
        { id: 21, name: 'AWS_Fundamentals.pdf', course: 'Cloud Computing Architecture', date: '2025-08-20', status: 'Completed', size: '8.7 MB' },
        { id: 22, name: 'Docker_and_Kubernetes.pdf', course: 'Cloud Computing Architecture', date: '2025-08-23', status: 'Completed', size: '10.4 MB' },
        { id: 23, name: 'Microservices_Architecture.pdf', course: 'Cloud Computing Architecture', date: '2025-08-26', status: 'Completed', size: '7.5 MB' },
        { id: 24, name: 'Serverless_Computing_Guide.docx', course: 'Cloud Computing Architecture', date: '2025-08-29', status: 'Completed', size: '3.8 MB' },
    ];

    // --- DOM ELEMENTS ---
    const dropZone = document.getElementById('drop-zone');
    const fileUpload = document.getElementById('file-upload');
    const uploadFeedback = document.getElementById('upload-feedback');
    const libraryTableBody = document.getElementById('content-library-table');
    const searchInput = document.getElementById('search-library');

    // --- FUNCTIONS ---
    function renderLibrary(filter = '') {
        libraryTableBody.innerHTML = '';
        const filteredLibrary = contentLibrary.filter(item =>
            item.name.toLowerCase().includes(filter.toLowerCase()) ||
            item.course.toLowerCase().includes(filter.toLowerCase())
        );

        if (filteredLibrary.length === 0) {
            libraryTableBody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500">No content found.</td></tr>`;
            return;
        }

        filteredLibrary.forEach(item => {
            const row = document.createElement('tr');

            let statusBadge;
            switch (item.status) {
                case 'Completed':
                    statusBadge = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300">
                            <svg class="-ml-0.5 mr-1.5 h-2 w-2 text-green-400" fill="currentColor" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" /></svg>
                            Completed
                        </span>`;
                    break;
                case 'Processing':
                    statusBadge = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-300">
                            <svg class="animate-spin -ml-0.5 mr-1.5 h-2 w-2 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            Processing
                        </span>`;
                    break;
                case 'Error':
                    statusBadge = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-300">
                            <svg class="-ml-0.5 mr-1.5 h-2 w-2 text-red-400" fill="currentColor" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" /></svg>
                            Error
                        </span>`;
                    break;
            }

            row.innerHTML = `
                    <td class="py-3 pr-4 font-semibold">${item.name}</td>
                    <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${item.course}</td>
                    <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${item.date}</td>
                    <td class="py-3 px-4">${statusBadge}</td>
                    <td class="py-3 pl-4 text-right">
                        <button class="p-2 text-gray-500 hover:text-amber-500 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button>
                        <button class="p-2 text-gray-500 hover:text-red-500 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800"><svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                    </td>
                `;
            libraryTableBody.appendChild(row);
        });
    }

    function handleFiles(files) {
        uploadFeedback.innerHTML = '';
        if (files.length === 0) return;

        const fileNames = Array.from(files).map(file => file.name).join(', ');
        uploadFeedback.innerHTML = `<p class="text-green-600 dark:text-green-400 font-semibold">Successfully uploaded: ${fileNames}</p>
            <p class="text-sm text-gray-500">AI processing has been initiated.</p>`;

        // Simulate adding to library and processing
        Array.from(files).forEach(file => {
            const newItem = {
                id: contentLibrary.length + 1,
                name: file.name,
                course: 'Unassigned',
                date: new Date().toISOString().split('T')[0],
                status: 'Processing'
            };
            contentLibrary.unshift(newItem);
            setTimeout(() => {
                const itemInLib = contentLibrary.find(i => i.id === newItem.id);
                if (itemInLib) itemInLib.status = 'Completed';
                renderLibrary(searchInput.value);
            }, 3000); // Simulate 3 second processing time
        });

        setTimeout(() => {
            renderLibrary(searchInput.value);
        }, 500);

        setTimeout(() => {
            uploadFeedback.innerHTML = '';
        }, 5000);
    }

    // --- EVENT LISTENERS ---
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, e => {
            e.preventDefault();
            e.stopPropagation();
        });
    });

    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('bg-gray-200', 'dark:bg-gray-700'));
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('bg-gray-200', 'dark:bg-gray-700'));
    });

    dropZone.addEventListener('drop', e => {
        handleFiles(e.dataTransfer.files);
    });

    fileUpload.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    searchInput.addEventListener('input', (e) => {
        renderLibrary(e.target.value);
    });

    // --- THEME & SIDEBAR LOGIC ---
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', function () {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const overlay = document.getElementById('sidebar-overlay');

        if (sidebar.classList.contains('-translate-x-full')) {
            sidebar.classList.remove('-translate-x-full');
            mainContent.classList.add('lg:translate-x-0', 'translate-x-64');
            overlay.classList.remove('hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            mainContent.classList.remove('lg:translate-x-0', 'translate-x-64');
            overlay.classList.add('hidden');
        }
    }

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        renderLibrary();
    });

</script>
</body>

</html>
