<!-- Command Palette (⌘K) -->
<div id="command-palette" class="fixed inset-0 z-modal-backdrop hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <!-- Backdrop -->
    <div class="fixed inset-0 glass-overlay transition-opacity opacity-0" id="command-palette-backdrop"></div>

    <div class="fixed inset-0 z-10 overflow-y-auto p-4 sm:p-6 md:p-20">
        <div class="mx-auto max-w-xl transform divide-y divide-glass-border overflow-hidden rounded-xl glass-card shadow-2xl ring-1 ring-black ring-opacity-5 transition-all scale-95 opacity-0" id="command-palette-panel">
            
            <!-- Search Input -->
            <div class="relative">
                <svg class="pointer-events-none absolute top-3.5 left-4 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                </svg>
                <input type="text" class="h-12 w-full border-0 bg-transparent pl-11 pr-4 text-primary placeholder-gray-500 focus:ring-0 sm:text-sm" placeholder="Search files, commands, or ask AI..." role="combobox" aria-expanded="false" aria-controls="options">
            </div>

            <!-- Results/Suggestions -->
            <ul class="max-h-96 scroll-py-3 overflow-y-auto p-3" id="command-results" role="listbox">
                
                <!-- Quick Actions Group -->
                <li class="group flex select-none rounded-xl p-3 hover:bg-glass-bg cursor-pointer transition-colors">
                    <div class="flex h-10 w-10 flex-none items-center justify-center rounded-lg bg-indigo-500/10">
                        <span class="text-indigo-500">✨</span>
                    </div>
                    <div class="ml-4 flex-auto">
                        <p class="text-sm font-medium text-primary">Ask Lumina AI</p>
                        <p class="text-xs text-secondary">Get help with your studies or code</p>
                    </div>
                </li>

                <!-- Navigation Group -->
                <li class="mt-2 mb-1 px-3 text-xs font-semibold text-gray-500">Navigation</li>
                
                <li class="group flex select-none rounded-xl p-3 hover:bg-glass-bg cursor-pointer transition-colors">
                    <div class="flex h-10 w-10 flex-none items-center justify-center rounded-lg bg-amber-500/10">
                        <svg class="h-6 w-6 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    </div>
                    <div class="ml-4 flex-auto">
                        <p class="text-sm font-medium text-primary">Dashboard</p>
                        <p class="text-xs text-secondary">Go to your main dashboard</p>
                    </div>
                </li>

                <li class="group flex select-none rounded-xl p-3 hover:bg-glass-bg cursor-pointer transition-colors">
                    <div class="flex h-10 w-10 flex-none items-center justify-center rounded-lg bg-blue-500/10">
                        <svg class="h-6 w-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                    </div>
                    <div class="ml-4 flex-auto">
                        <p class="text-sm font-medium text-primary">Workspace</p>
                        <p class="text-xs text-secondary">Access AI tools and files</p>
                    </div>
                </li>
            </ul>

            <!-- Footer -->
            <div class="flex flex-wrap items-center bg-glass-bg py-2.5 px-4 text-xs text-gray-500">
                Open <kbd class="mx-1 flex h-5 w-5 items-center justify-center rounded border border-gray-200 bg-white font-semibold text-gray-900 sm:mx-2">↵</kbd>
                to select
                <span class="mx-2 h-4 border-l border-gray-300"></span>
                Type <kbd class="mx-1 flex h-5 w-5 items-center justify-center rounded border border-gray-200 bg-white font-semibold text-gray-900 sm:mx-2">?</kbd>
                for help
            </div>
        </div>
    </div>
</div>

<script>
    // Basic Command Palette Logic
    (function() {
        const palette = document.getElementById('command-palette');
        const backdrop = document.getElementById('command-palette-backdrop');
        const panel = document.getElementById('command-palette-panel');
        
        function openPalette() {
            palette.classList.remove('hidden');
            // Small delay to allow display:block to apply before transitioning opacity
            setTimeout(() => {
                backdrop.classList.remove('opacity-0');
                panel.classList.remove('scale-95', 'opacity-0');
                panel.querySelector('input').focus();
            }, 10);
        }
        
        function closePalette() {
            backdrop.classList.add('opacity-0');
            panel.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                palette.classList.add('hidden');
            }, 200);
        }
        
        // Event Listeners
        window.addEventListener('toggle-command-palette', openPalette);
        
        window.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                if (palette.classList.contains('hidden')) {
                    openPalette();
                } else {
                    closePalette();
                }
            }
            if (e.key === 'Escape' && !palette.classList.contains('hidden')) {
                closePalette();
            }
        });
        
        backdrop.addEventListener('click', closePalette);
    })();
</script>
