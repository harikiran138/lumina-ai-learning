<!DOCTYPE html>
<html lang="en" class="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Explorer - Lumina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Dynamic Database System Scripts -->
    <script src="../js/database.js"></script>
    <script src="../js/courses-data.js"></script>
    <script src="../js/messaging-system.js"></script>
    <script src="../js/profile-manager.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #light-icon,
        #dark-icon {
            display: none;
        }

        html.dark #dark-icon {
            display: block;
        }

        html:not(.dark) #light-icon {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #d1d5db;
            border-radius: 4px;
        }

        html.dark ::-webkit-scrollbar-thumb {
            background-color: #4b5563;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #9ca3af;
        }

        html.dark ::-webkit-scrollbar-thumb:hover {
            background-color: #6b7280;
        }

        aside nav {
            min-height: calc(100vh - 128px);
            overflow-y: auto;
        }

        .course-card {
            transition: all 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        /* Animations */
        @keyframes fade-in-up {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fade-in-up 0.6s ease-out forwards;
        }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-black text-gray-800 dark:text-gray-300 transition-colors duration-300">
    <div class="relative min-h-screen lg:flex">
        <!-- Sidebar -->
        <aside id="sidebar"
            class="w-64 flex-shrink-0 bg-white dark:bg-[#111111] border-r border-gray-200 dark:border-gray-800 flex flex-col transition-transform duration-300 ease-in-out -translate-x-full lg:translate-x-0 fixed lg:relative z-30 h-full">
            <div class="h-16 flex items-center justify-center border-b border-gray-200 dark:border-gray-800">
                <a href="index.html" class="text-2xl font-bold">
                    <span class="gradient-text">Lumina</span> ✨
                </a>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-2">
                <a href="dashboard.html"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Dashboard
                </a>
                <a href="ai_tutor.html"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M6.343 18.364l-.707.707M19 12h-1M5 12H4M7.636 6.364l.707-.707M16.364 18.364l.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    AI Tutor
                </a>
                <a href="course_explorer.html"
                    class="flex items-center px-4 py-2.5 text-sm font-medium bg-gradient-to-r from-amber-50 to-amber-100 dark:from-amber-900/20 dark:to-amber-900/10 text-amber-700 dark:text-amber-400 rounded-lg shadow-sm">
                    <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    Explore Courses
                </a>
                <a href="my_notes.html"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                        </path>
                    </svg>
                    My Notes
                </a>
                <a href="progress_streaks.html"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    My Progress
                </a>
                <a href="leaderboard.html"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    Leaderboard
                </a>
                <a href="community.html"
                    class="flex items-center px-4 py-2.5 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    Community
                </a>
            </nav>
            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <a href="../login.html"
                    class="flex items-center w-full px-4 py-2.5 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                    <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div id="main-content"
            class="flex-1 flex flex-col w-full lg:w-auto transition-transform duration-300 ease-in-out h-screen overflow-y-auto">
            <!-- Header -->
            <header
                class="h-16 flex items-center justify-between px-6 bg-white dark:bg-[#111111] border-b border-gray-200 dark:border-gray-800 flex-shrink-0 sticky top-0 z-10">
                <div class="flex items-center">
                    <button id="menu-button"
                        class="lg:hidden mr-4 p-2 rounded-md text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800"
                        onclick="toggleSidebar()">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                    <h1 class="text-xl font-semibold text-gray-900 dark:text-white">Explore Courses</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="theme-toggle"
                        class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800">
                        <svg id="light-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        <svg id="dark-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                    </button>
                    <div class="flex items-center space-x-2">
                        <span class="font-semibold text-sm text-gray-700 dark:text-gray-300">Alex Turner</span>
                        <div
                            class="w-10 h-10 rounded-full bg-amber-500 flex items-center justify-center text-white font-bold text-lg">
                            A</div>
                    </div>
                </div>
            </header>

            <!-- Course Grid -->
            <main class="flex-1 p-4 md:p-6 lg:p-8 overflow-y-auto">
                <div class="max-w-7xl mx-auto">
                    <!-- Search and Filter -->
                    <div class="mb-8">
                        <div class="relative mb-4">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                                <svg class="w-5 h-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none"
                                    viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                </svg>
                            </span>
                            <input id="search-input" type="search" placeholder="Search for courses..."
                                class="w-full pl-10 pr-4 py-3 bg-white dark:bg-[#1C1C1C] border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-amber-500 focus:outline-none transition-shadow">
                        </div>
                        <div id="filter-container" class="flex items-center gap-2 mb-4 overflow-x-auto pb-2">
                            <button data-category="All"
                                class="filter-btn px-4 py-2 text-sm font-semibold text-white bg-amber-500 rounded-full flex-shrink-0">All</button>
                            <button data-category="Science"
                                class="filter-btn px-4 py-2 text-sm font-semibold text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-[#1C1C1C] rounded-full flex-shrink-0 hover:bg-gray-300 dark:hover:bg-gray-700">Science</button>
                            <button data-category="Mathematics"
                                class="filter-btn px-4 py-2 text-sm font-semibold text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-[#1C1C1C] rounded-full flex-shrink-0 hover:bg-gray-300 dark:hover:bg-gray-700">Mathematics</button>
                            <button data-category="History"
                                class="filter-btn px-4 py-2 text-sm font-semibold text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-[#1C1C1C] rounded-full flex-shrink-0 hover:bg-gray-300 dark:hover:bg-gray-700">History</button>
                            <button data-category="Literature"
                                class="filter-btn px-4 py-2 text-sm font-semibold text-gray-700 dark:text-gray-300 bg-gray-200 dark:bg-[#1C1C1C] rounded-full flex-shrink-0 hover:bg-gray-300 dark:hover:bg-gray-700">Literature</button>
                        </div>

                        <!-- Level Filter -->
                        <select id="level-filter" class="px-4 py-2 bg-white dark:bg-[#1C1C1C] border border-gray-200 dark:border-gray-700 rounded-lg text-sm">
                            <option value="">All Levels</option>
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>

                    <!-- Course Cards -->
                    <div id="course-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Course cards will be dynamically inserted here -->
                    </div>

                    <!-- No Results -->
                    <p id="no-results" class="text-gray-500 dark:text-gray-400 hidden text-center py-8">No courses found matching your criteria.</p>
                </div>
            </main>
        </div>

        <!-- Mobile sidebar overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden" onclick="toggleSidebar()">
        </div>
    </div>

    <script type="module">
        let allCourses = window.getAllCourses();
        let filteredCourses = [...allCourses];

        // Initialize
        await window.navigationManager.init();
        const currentUser = await window.luminaDB.getCurrentUser();

        if (!currentUser) {
            window.location.href = '../login.html';
        } else {
            // Filter and render functions
            function applyFilters() {
                const searchTerm = document.getElementById('search-input').value.toLowerCase();
                const level = document.getElementById('level-filter').value;

                filteredCourses = allCourses.filter(course => {
                    let match = true;

                    if (searchTerm && !course.name.toLowerCase().includes(searchTerm) &&
                        !course.description.toLowerCase().includes(searchTerm)) {
                        match = false;
                    }

                    if (level && course.level !== level) match = false;

                    return match;
                });

                // Sort by popularity
                filteredCourses.sort((a, b) => b.students - a.students);

                renderCourses();
            }

            function renderCourses() {
                const grid = document.getElementById('course-grid');
                const noResults = document.getElementById('no-results');

                if (filteredCourses.length === 0) {
                    grid.innerHTML = '';
                    noResults.classList.remove('hidden');
                } else {
                    noResults.classList.add('hidden');
                    grid.innerHTML = filteredCourses.map(course => `
                        <div class="course-card card overflow-hidden">
                            <img src="${course.image}" alt="${course.name}" class="w-full h-40 object-cover">
                            <div class="p-5">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="badge badge-primary text-xs">${course.level}</span>
                                    <span class="text-sm font-semibold">⭐ ${course.rating}</span>
                                </div>
                                
                                <h3 class="font-bold text-lg mb-2 line-clamp-2">${course.name}</h3>
                                
                                <div class="flex items-center gap-2 mb-3">
                                    <img src="${course.instructor.avatar || 'https://via.placeholder.com/32'}" alt="${course.instructor.name}" 
                                        class="w-6 h-6 rounded-full bg-amber-500 text-white flex items-center justify-center text-xs font-bold">
                                    <span class="text-sm font-medium">${course.instructor.name}</span>
                                </div>

                                <p class="text-sm text-gray-600 dark:text-gray-400 mb-3 line-clamp-2">${course.description}</p>

                                <div class="flex items-center justify-between text-xs text-gray-500 dark:text-gray-400 mb-4">
                                    <div class="space-x-3">
                                        <span>👥 ${course.students}</span>
                                        <span>📊 ${course.reviews} reviews</span>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between mb-4">
                                    <span class="text-xs text-gray-600 dark:text-gray-400">
                                        ⏱️ ${course.duration} • 🎥 ${course.videos} videos
                                    </span>
                                </div>

                                <div class="flex items-center justify-between">
                                    <span class="text-lg font-bold">$${course.price}</span>
                                    <button onclick="alert('Enroll in ${course.name}')" class="btn btn-primary btn-sm">
                                        Enroll Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            }

            // Event listeners
            document.getElementById('search-input').addEventListener('input', applyFilters);
            document.getElementById('level-filter').addEventListener('change', applyFilters);

            // Category filter
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-amber-500', 'text-white');
                        b.classList.add('bg-gray-200', 'dark:bg-[#1C1C1C]', 'text-gray-700', 'dark:text-gray-300');
                    });
                    this.classList.add('bg-amber-500', 'text-white');
                    this.classList.remove('bg-gray-200', 'dark:bg-[#1C1C1C]', 'text-gray-700', 'dark:text-gray-300');
                });
            });

            // Theme toggle
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('click', function () {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            });

            // Sidebar toggle
            function toggleSidebar() {
                const sidebar = document.getElementById('sidebar');
                const mainContent = document.getElementById('main-content');
                const overlay = document.getElementById('sidebar-overlay');

                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                    mainContent.classList.add('lg:translate-x-0', 'translate-x-64');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    mainContent.classList.remove('lg:translate-x-0', 'translate-x-64');
                    overlay.classList.add('hidden');
                }
            }

            // Initial render
            renderCourses();
        }
    </script>
</body>

</html>
