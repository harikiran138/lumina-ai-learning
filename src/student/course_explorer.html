<!DOCTYPE html>
<html lang="en" class="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Explorer - Lumina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Core Scripts -->
    <script src="../js/database.js"></script>
    <script src="../js/courses-data.js"></script>
    <script src="../js/messaging-system.js"></script>
    <script src="../js/profile-manager.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .course-card {
            transition: all 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
    </style>

    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
    <!-- Top Navigation -->
    <div id="top-nav-container"></div>

    <div class="flex">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <main class="flex-1 pt-20 pb-8">
            <div class="container mx-auto px-4 lg:px-8">
                <!-- Page Header -->
                <div class="mb-8">
                    <h1 class="text-4xl font-bold mb-2">Discover Courses</h1>
                    <p class="text-gray-600 dark:text-gray-400">Explore thousands of courses and advance your skills</p>
                </div>

                <!-- Search and Filters -->
                <div class="card p-6 mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <!-- Search Input -->
                        <div class="md:col-span-2">
                            <input type="text" id="search-input" placeholder="Search courses..." 
                                class="form-input w-full" value="">
                        </div>

                        <!-- Category Filter -->
                        <select id="category-filter" class="form-select">
                            <option value="">All Categories</option>
                        </select>

                        <!-- Level Filter -->
                        <select id="level-filter" class="form-select">
                            <option value="">All Levels</option>
                            <option value="Beginner">Beginner</option>
                            <option value="Intermediate">Intermediate</option>
                            <option value="Advanced">Advanced</option>
                        </select>
                    </div>

                    <!-- Additional Filters -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-4">
                        <!-- Rating Filter -->
                        <select id="rating-filter" class="form-select">
                            <option value="">All Ratings</option>
                            <option value="4.5">4.5+ Stars</option>
                            <option value="4.0">4.0+ Stars</option>
                            <option value="3.5">3.5+ Stars</option>
                        </select>

                        <!-- Price Filter -->
                        <select id="price-filter" class="form-select">
                            <option value="">All Prices</option>
                            <option value="free">Free</option>
                            <option value="paid">Paid</option>
                        </select>

                        <!-- Sort -->
                        <select id="sort-filter" class="form-select">
                            <option value="popular">Most Popular</option>
                            <option value="rating">Highest Rated</option>
                            <option value="newest">Newest</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                        </select>

                        <!-- Results Info -->
                        <div class="flex items-center justify-end">
                            <p class="text-sm text-gray-600 dark:text-gray-400">
                                Showing <span id="results-count">0</span> courses
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Courses Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="courses-grid">
                    <!-- Courses will be loaded here -->
                </div>

                <!-- No Results Message -->
                <div id="no-results" class="text-center py-12 hidden">
                    <svg class="w-16 h-16 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="text-2xl font-bold mb-2">No courses found</h3>
                    <p class="text-gray-600 dark:text-gray-400">Try adjusting your search or filters</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        let allCourses = window.getAllCourses();
        let filteredCourses = [...allCourses];

        // Initialize
        await window.navigationManager.init();
        const currentUser = await window.luminaDB.getCurrentUser();

        if (!currentUser) {
            window.location.href = '../login.html';
        } else {
            // Load navigation
            document.getElementById('top-nav-container').innerHTML = window.navigationManager.generateTopNav('student');
            document.getElementById('sidebar-container').innerHTML = window.navigationManager.generateSidebar('student');
            window.navigationManager.setupEventListeners();

            // Populate category filter
            const categories = window.getCategories();
            const categoryFilter = document.getElementById('category-filter');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categoryFilter.appendChild(option);
            });

            // Filter and render functions
            function applyFilters() {
                const searchTerm = document.getElementById('search-input').value.toLowerCase();
                const category = document.getElementById('category-filter').value;
                const level = document.getElementById('level-filter').value;
                const rating = document.getElementById('rating-filter').value;
                const priceType = document.getElementById('price-filter').value;
                const sortBy = document.getElementById('sort-filter').value;

                filteredCourses = allCourses.filter(course => {
                    let match = true;

                    if (searchTerm && !course.name.toLowerCase().includes(searchTerm) &&
                        !course.description.toLowerCase().includes(searchTerm) &&
                        !course.tags.some(tag => tag.toLowerCase().includes(searchTerm))) {
                        match = false;
                    }

                    if (category && course.category !== category) match = false;
                    if (level && course.level !== level) match = false;
                    if (rating && course.rating < parseFloat(rating)) match = false;
                    if (priceType === 'free' && course.price > 0) match = false;
                    if (priceType === 'paid' && course.price === 0) match = false;

                    return match;
                });

                // Sort
                if (sortBy === 'rating') {
                    filteredCourses.sort((a, b) => b.rating - a.rating);
                } else if (sortBy === 'newest') {
                    filteredCourses.sort((a, b) => new Date(b.startDate) - new Date(a.startDate));
                } else if (sortBy === 'price-low') {
                    filteredCourses.sort((a, b) => a.price - b.price);
                } else if (sortBy === 'price-high') {
                    filteredCourses.sort((a, b) => b.price - a.price);
                } else {
                    filteredCourses.sort((a, b) => b.students - a.students);
                }

                renderCourses();
            }

            function renderCourses() {
                const grid = document.getElementById('courses-grid');
                const noResults = document.getElementById('no-results');
                const resultsCount = document.getElementById('results-count');

                resultsCount.textContent = filteredCourses.length;

                if (filteredCourses.length === 0) {
                    grid.innerHTML = '';
                    noResults.classList.remove('hidden');
                } else {
                    noResults.classList.add('hidden');
                    grid.innerHTML = filteredCourses.map(course => `
                        <div class="course-card card overflow-hidden">
                            <img src="${course.image}" alt="${course.name}" class="w-full h-40 object-cover">
                            <div class="p-5">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="badge badge-primary text-xs">${course.level}</span>
                                    <span class="text-sm font-semibold">⭐ ${course.rating}</span>
                                </div>
                                
                                <h3 class="font-bold text-lg mb-2 line-clamp-2">${course.name}</h3>
                                
                                <div class="flex items-center gap-2 mb-3">
                                    <img src="${course.instructor.avatar || 'https://via.placeholder.com/32'}" alt="${course.instructor.name}" 
                                        class="w-6 h-6 rounded-full bg-amber-500 text-white flex items-center justify-center text-xs font-bold">
                                    <span class="text-sm font-medium">${course.instructor.name}</span>
                                </div>

                                <p class="text-sm text-gray-600 dark:text-gray-400 mb-3 line-clamp-2">${course.description}</p>

                                <div class="flex items-center justify-between text-xs text-gray-500 dark:text-gray-400 mb-4">
                                    <div class="space-x-3">
                                        <span>👥 ${course.students}</span>
                                        <span>📊 ${course.reviews} reviews</span>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between mb-4">
                                    <span class="text-xs text-gray-600 dark:text-gray-400">
                                        ⏱️ ${course.duration} • 🎥 ${course.videos} videos
                                    </span>
                                </div>

                                <div class="flex items-center justify-between">
                                    <span class="text-lg font-bold">$${course.price}</span>
                                    <button onclick="alert('Enroll in ${course.name}')" class="btn btn-primary btn-sm">
                                        Enroll Now
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            }

            // Event listeners
            document.getElementById('search-input').addEventListener('input', applyFilters);
            document.getElementById('category-filter').addEventListener('change', applyFilters);
            document.getElementById('level-filter').addEventListener('change', applyFilters);
            document.getElementById('rating-filter').addEventListener('change', applyFilters);
            document.getElementById('price-filter').addEventListener('change', applyFilters);
            document.getElementById('sort-filter').addEventListener('change', applyFilters);

            // Initial render
            renderCourses();
        }
    </script>
</body>

</html>
